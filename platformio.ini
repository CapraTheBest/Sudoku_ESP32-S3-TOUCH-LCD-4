; =============================================================================
; Sudoku Panel - PlatformIO configuration
;
; Due ambienti:
;   - native:               test unitari dell'engine/sessione (C++ puro, su PC)
;   - esp32-s3-touch-lcd-4:  firmware per il device (Waveshare ESP32-S3-Touch-LCD-4)
; =============================================================================

[platformio]
default_envs = esp32-s3-touch-lcd-4

; ---------------------------------------------------------------------------
; Test nativi (engine + game session). Niente sorgenti Arduino qui.
; ---------------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17 -Wall
build_src_filter = -<*>

; ---------------------------------------------------------------------------
; Firmware device.
; pioarduino fork: Arduino-ESP32 3.0.7 + ESP-IDF v5.1 (richiesti da
; ESP32_Display_Panel v0.1.8, come il demo ufficiale Waveshare).
; ---------------------------------------------------------------------------
[env:esp32-s3-touch-lcd-4]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600

; Flash 16 MB QIO, PSRAM 8 MB OPI (Waveshare N16R8)
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_upload.maximum_size = 16777216
board_build.partitions = partitions.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -DLV_CONF_PATH="${PROJECT_INCLUDE_DIR}/lv_conf.h"
    -DCORE_DEBUG_LEVEL=3
    -I include

lib_deps =
    lvgl/lvgl @ ^8.4.0
    https://github.com/esp-arduino-libs/ESP32_Display_Panel.git#v0.1.8
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git#v0.0.4
